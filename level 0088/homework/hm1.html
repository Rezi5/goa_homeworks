<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-gray-800 text-white transition-all duration-300 -translate-x-full md:translate-x-0">
<nav class="p-6 space-y-4">
<a class="block pl-4 border-l-4 border-blue-500 bg-gray-700">Dashboard</a>
<a class="block pl-4 hover:bg-gray-700">Users</a>
<a class="block pl-4 hover:bg-gray-700">Settings</a>
</nav>
<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-gray-800 text-white transition-all duration-300 -translate-x-full md:translate-x-0">
<nav class="p-6 space-y-4">
<a class="block pl-4 border-l-4 border-blue-500 bg-gray-700">Dashboard</a>
<a class="block pl-4 hover:bg-gray-700">Users</a>
<a class="block pl-4 hover:bg-gray-700">Settings</a>
</nav>
</div>

<div class="md:ml-64 p-10 space-y-20">

<!-- BUTTON -->
<button onclick="toggleSidebar()" class="w-20 h-20 rounded-full bg-blue-500 text-white animate-bounce lg:animate-none hover:bg-black hover:text-white focus:ring-4 focus:animate-none transition">
Menu
</button>

<!-- GRID CARDS -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
<div class="lg:col-span-2 shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">1</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">2</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">3</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">4</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">5</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">6</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">7</div>
<div class="shadow-lg rounded-2xl p-6 transition hover:scale-105 hover:shadow-2xl bg-white">8</div>
</div>

<!-- LOADER -->
<div class="flex items-center justify-center">
<div class="flex items-end gap-3">
<div class="w-2 h-2 bg-black dark:bg-white animate-pulse"></div>
<div class="w-3 h-3 bg-black dark:bg-white animate-pulse [animation-delay:200ms]"></div>
<div class="w-4 h-4 bg-black dark:bg-white animate-pulse [animation-delay:400ms]"></div>
<div class="w-5 h-5 bg-black dark:bg-white animate-pulse [animation-delay:600ms]"></div>
<div class="w-6 h-6 bg-black dark:bg-white animate-pulse [animation-delay:800ms]"></div>
</div>
</div>

<!-- ADVANCED CARD -->
<div class="flex justify-center">
<div class="group w-72 p-6 bg-white shadow-xl rounded-2xl transform rotate-2 transition duration-500 ease-in-out hover:scale-105 hover:-translate-y-3">
<h2 class="text-xl font-bold mb-4">Card</h2>
<button class="opacity-0 group-hover:opacity-100 transition bg-black text-white px-4 py-2 rounded">
Action
</button>
</div>
</div>

</div>


</body>
</html>
