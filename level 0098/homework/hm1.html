<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script> 
</head>
<body>
    <!-- <div class="flex justify-center items-center h-screen">
        <button class="w-[70px] h-[50px] bg-blue-500 rounded-xl" id="Sign">Sign up</button>

<button  class="px-4 py-2 bg-blue-600 text-white rounded" onclick="usr()">
    Open Modal
</button>

<div id="myModal" class="flex  hidden w-100 h-100 bg-opacity-50 items-center justify-center">
    <div class="bg-white p-6 rounded shadow-lg w-80">
    <h1  class="bg-white p-6 rounded shadow-lg w-80">This is modal</h1>
    <p  class="text-lg font-bold mb-4">Made by tailwind css</p>
    <button id="BTN" onclick="usr1()">Close</button>
    </div>
</div>
<script>
    let usr = ()=>{
        document.getElementById("myModal").classList.remove("hidden")
    }
    let usr1 = () =>{
        document.getElementById("myModal").classList.add("hidden") 
        }
</script>
</body>
</html>
