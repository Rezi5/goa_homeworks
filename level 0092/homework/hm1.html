<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    
<div class="p-6 space-y-10 bg-gray-100 min-h-screen">

<!-- 1) Card with group hover -->
<div class="group w-64 bg-white rounded-xl overflow-hidden shadow-lg cursor-pointer">
    <img src="https://picsum.photos/300/200"
    class="w-full transition duration-300 group-hover:scale-105">
    <div class="p-4">
    <h2 class="text-lg font-bold transition group-hover:text-blue-500">
        Card Title
    </h2>
    <p class="text-gray-600 line-clamp-2">
        This is a description that will be clamped to two lines only if it gets too long.
    </p>
    </div>
</div>

<!-- 2) Button with icon -->
<button class="group flex items-center gap-2 bg-gray-200 px-4 py-2 rounded-lg">
    <span class="transition group-hover:translate-x-1">➡️</span>
    <span class="transition group-hover:text-gray-900 text-gray-600">
    Click Me
    </span>
</button>

<!-- 3) Password input -->
<div>
    <input type="password" placeholder="Enter password"
        class="peer border p-2 rounded w-64">
    <p class="text-red-500 text-sm mt-1 hidden peer-placeholder-shown:block">
    Password is required
    </p>
</div>

<!-- 4) Checkbox -->
<div>
    <input type="checkbox" id="check" class="peer">
    <label for="check"
        class="ml-2 peer-checked:text-blue-500 peer-checked:font-bold">
    Subscribe to newsletter
    </label>
</div>

<h1 class="font-bold text-[clamp(1.5rem,5vw,3rem)]">
    Responsive Title
</h1>

<!-- 6) Button with ring -->
<button class="px-4 py-2 bg-blue-500 text-white rounded-lg
                focus:ring-4 focus:ring-blue-300
                hover:ring-4 hover:ring-blue-300 transition">
    Ring Button
</button>

<!-- 7) Scroll snap images -->
<div class="flex overflow-x-auto snap-x snap-mandatory gap-4">
    <img src="https://picsum.photos/200?1"
        class="snap-center shrink-0 w-64 rounded-lg">
    <img src="https://picsum.photos/200?2"
        class="snap-center shrink-0 w-64 rounded-lg">
    <img src="https://picsum.photos/200?3"
        class="snap-center shrink-0 w-64 rounded-lg">
</div>

<!-- 8) Line clamp text -->
<p class="w-64 bg-white p-4 rounded-lg line-clamp-2">
    This is a very long description text that will be cut after two lines and show dots at the end automatically using Tailwind utilities.
</p>

</div>
</body>
</html>
